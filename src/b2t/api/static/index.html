<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>b2t testing UI</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/vendor/codemirror/codemirror.min.css" />
  <link rel="stylesheet" href="/vendor/codemirror/material-darker.min.css" />
</head>
<body>
  <main id="app">
    <h1>b2t: Beamer to Touying</h1>

    <section class="submit">
      <label>
        Deck folder:
        <input type="file" id="folder" webkitdirectory directory multiple />
      </label>
      <div class="options">
        <label><input type="checkbox" id="use-fake" /> use fake converter (offline)</label>
      </div>
      <div class="actions">
        <button id="run">Convert folder</button>
        <label class="sample-pick">
          sample deck
          <select id="sample-deck"></select>
        </label>
        <button id="run-sample" type="button">Use sample deck</button>
      </div>
    </section>

    <section class="status">
      <span id="badge" class="badge">idle</span>
      <div id="graph"></div>
      <div id="graph-hint">Click a pipeline node to view the LangGraph state object at that step (after a run).</div>
      <div id="state-inspector" hidden></div>
      <div id="llm-nodes"></div>
      <div id="provenance"></div>
    </section>

    <section class="output">
      <h2>Generated main.typ</h2>
      <textarea id="typ"></textarea>
      <div class="actions">
        <button id="save" type="button" disabled>Save and compile</button>
        <button id="download" type="button" disabled>Download</button>
      </div>
      <h2>Compiled PDF</h2>
      <iframe id="pdf" title="compiled pdf"></iframe>
      <h2>Compile error</h2>
      <pre id="error">(none)</pre>
    </section>
  </main>
  <script src="/vendor/codemirror/codemirror.min.js"></script>
  <script src="/vendor/codemirror/simple.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
