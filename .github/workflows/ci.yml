name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.14.2"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest -v
